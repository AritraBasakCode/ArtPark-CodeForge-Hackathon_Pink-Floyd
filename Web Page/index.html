<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Skill Gap Analyzer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Resume Skill Gap Analyzer</h1>
    <p class="subtitle">Upload your resume and paste the job description to analyze skill gaps.</p>

    <section class="card">
      <h2>Upload Resume</h2>
      <label for="resume" class="label">Resume File (PDF/DOC/DOCX)</label>
      <input type="file" id="resume" accept=".pdf,.doc,.docx" />
    </section>

    <section class="card">
      <h2>Job Description</h2>
      <label for="jobDescription" class="label">Paste the target job description</label>
      <textarea id="jobDescription" rows="10" placeholder="Paste job description here..."></textarea>
    </section>

    <button id="analyzeBtn" class="analyze-btn">Analyze</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
